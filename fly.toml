app = "city-bucket-list"
primary_region = "lax"

[build]

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[[mounts]]
  source = "audio_cache"
  destination = "/data/audio-cache"
  initial_size = "1gb"

[[checks]]
  name = "health"
  port = 3000
  type = "http"
  interval = "30s"
  timeout = "5s"
  path = "/healthz"
  method = "GET"
